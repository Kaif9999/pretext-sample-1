<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll — Pretext</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #e8dcc8; }
      canvas { display: block; touch-action: none; }
      #hint {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
        color: rgba(45, 32, 20, 0.72); font-family: "EB Garamond", Garamond, serif;
        font-size: 15px; pointer-events: none; text-align: center; max-width: min(520px, 92vw);
        line-height: 1.4;
      }
      #hint strong { color: #1a1208; font-weight: 600; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="hint">Pull the <strong>final letter</strong> downward — each character is linked like ink on a thread. Release low to rest on the foot of the page. Double-click to reset.</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
